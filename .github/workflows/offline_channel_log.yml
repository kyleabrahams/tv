name: Offline Channel Log

on:
  schedule:
    - cron: "0 12 * * *"  # every day UTC
  workflow_dispatch:

jobs:
  vpn_iptv_check:
    name: Offline Channel Log
    runs-on: ubuntu-latest

    env:
      VPN_USERNAME: ${{ secrets.VPN_USERNAME }}
      VPN_PASSWORD: ${{ secrets.VPN_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # 🛡️ Upgraded from v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup FFmpeg and FFprobe
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn
          pip3 install --upgrade pip
          pip3 install tqdm pyyaml

      - name: Run IPTV offline checker
        run: |
          python3 -u scripts/vpn_iptv_checker-alive.py || echo "Script finished with errors"

      - name: Upload offline log as artifact
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: offline_channel_log
          path: scripts/offline_channel_log.yml
