name: Run EPG Grabber

on:
  workflow_dispatch:   # allows manual run from Actions tab
  schedule:
    - cron: '0 2 * * *'   # runs daily at 2AM UTC, adjust if needed

jobs:
  run-grab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run grab.ts
        run: npx ts-node ./scripts/commands/epg/grab.ts --site bbc --output guide.xml
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"  # optional for memory-heavy jobs
